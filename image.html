<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse Image Location Search</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9; 
            padding: 40px; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 100%; 
            max-width: 400px; 
        }
        input[type="file"] { 
            margin: 20px 0; 
        }
        button { 
            background-color: #007BFF; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px;
        }
        button:hover { 
            background-color: #0056b3; 
        }
        #result { 
            margin-top: 20px; 
            text-align: left; 
            padding: 15px;
            background: #eef;
            border-radius: 5px;
            display: none;
        }
        a { color: #007BFF; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Location Search</h2>
        <p>Upload an image to find its exact coordinates.</p>
        
        <input type="file" id="imageInput" accept="image/*">
        <br>
        <button onclick="uploadImage()">Search Location</button>
        
        <div id="result">
            </div>
    </div>

    <script>
        async function uploadImage() {
            const fileInput = document.getElementById('imageInput');
            const resultDiv = document.getElementById('result');
            
            if (!fileInput.files[0]) {
                alert("Please select an image first.");
                return;
            }

            resultDiv.style.display = "block";
            resultDiv.innerHTML = "<p>Analyzing image... Please wait.</p>";

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            try {
                // IMPORTANT: This connects the HTML to your Python backend!
                // We are assuming your Python server will run locally on port 5000.
                const response = await fetch('http://localhost:5000/search', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if (data.error) {
                    resultDiv.innerHTML = `<p style='color:red;'>Error: ${data.error}</p>`;
                } else {
                    resultDiv.innerHTML = `
                        <h3 style="margin-top: 0;">Location Found!</h3>
                        <p><strong>Name:</strong> ${data.name}</p>
                        <p><strong>Accuracy:</strong> ${data.confidence}%</p>
                        <hr>
                        <p><a href="http://maps.google.com/maps?q=${data.lat},${data.lng}" target="_blank">📍 View on Google Maps</a></p>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = "<p style='color:red;'>Error: Could not connect to the server. Make sure your Python backend is running.</p>";
            }
        }
    </script>

</body>
</html>
